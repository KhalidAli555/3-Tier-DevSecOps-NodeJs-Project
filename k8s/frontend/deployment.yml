apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: khalidale/frontend:02
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API
              value: "http://backend-service:5000"
